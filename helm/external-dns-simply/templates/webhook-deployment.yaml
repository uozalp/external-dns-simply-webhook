apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "external-dns-simply.webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "external-dns-simply.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "external-dns-simply.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        {{- include "external-dns-simply.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webhook
    spec:
      containers:
        - name: webhook
          image: "{{ .Values.webhook.image.repository }}:{{ .Values.webhook.image.tag }}"
          imagePullPolicy: {{ .Values.webhook.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.webhook.port }}
              name: http
              protocol: TCP
          env:
            - name: SIMPLY_ACCOUNT_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.simply.existingSecret }}
                  key: {{ .Values.simply.accountNameKey }}
            - name: SIMPLY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.simply.existingSecret }}
                  key: {{ .Values.simply.apiKeyKey }}
            - name: LOG_LEVEL
              value: {{ .Values.webhook.logLevel | quote }}
            {{- if .Values.domainFilter }}
            - name: DOMAIN_FILTER
              value: {{ .Values.domainFilter | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
